name: CLSense Backend Dev Pipeline

on:
  push:
    branches:
      - main
    paths:
      - main.py
      - requirements.txt
      - Dockerfile
      - .dockerignore
      - .env
      - docker-compose.yml
      - .github/workflows/pipeline-cls-dev.yml

env:
  DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ocr-as-a-agent-ocr-api

jobs:
  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build ./backend \
            --pull \
            -t ${{ env.DOCKERHUB_IMAGE_NAME }}:latest

      - name: Push to DockerHub
        run: |
          docker push ${{ env.DOCKERHUB_IMAGE_NAME }}:latest